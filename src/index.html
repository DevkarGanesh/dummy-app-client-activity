<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>ISG Travel — Booking Portal</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- ═══════════════════════════════════════════════════════
       Analytics Tracking Config
       Sets dummy session storage data + configures the tracker
  ═══════════════════════════════════════════════════════ -->
  <script>
    // ── 1. Seed dummy sessionStorage (mimics what real apps store) ────────────
    //    Read automatically by the tracker via SESSION_STORAGE_KEYS.
    //    In a real app these are set on login / booking load.
    sessionStorage.setItem('account_name', 'Miss radhika biranje');
    sessionStorage.setItem('account_code', '0000100158');
    sessionStorage.setItem('booking_no', 500221);
    sessionStorage.setItem('quote_no', 500221);
    sessionStorage.setItem('itinerary_no', 900000744);
    sessionStorage.setItem('itinerary_name', 'Holiday to United Arab Emirates');


    // ── 2. Analytics tracker config ───────────────────────────────────────────
    window.ANALYTICS_CONFIG = {
      TRACKING_SERVER: 'https://dhruv.isgesolutions.com/dhruvanalytics',
      SITE_ID: 'isg-booking-demo',

      // Maps analytics field name → sessionStorage key used by THIS app
      SESSION_STORAGE_KEYS: {
        account_name: 'account_name',
        account_code: 'account_code',
        booking_no: 'booking_no',
        quote_no: 'quote_no',
        itinerary_no: 'itinerary_no',
        itinerary_name: 'itinerary_name'
      }
    };
  </script>
</head>

<body>
  <app-root></app-root>

  <!-- Analytics Tracker — must come AFTER window.ANALYTICS_CONFIG -->
  <script src="https://dhruv.isgesolutions.com/dhruvanalytics/tracker.js"></script>
</body>

</html>
