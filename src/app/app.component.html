<router-outlet></router-outlet>

<!-- ── Analytics Debug Panel ──────────────────────────────── -->
<div class="page" style="margin-top:2rem">

  <!-- sessionStorage values -->
  <div class="card">
    <div class="card-title">📦 SessionStorage → Analytics Fields</div>
    <div class="ss-grid">
      <div class="ss-item" *ngFor="let item of sessionData">
        <div class="ss-key">{{ item.key }}</div>
        <div class="ss-val">{{ item.value }}</div>
      </div>
    </div>
  </div>

  <!-- Live event log -->
  <div class="card">
    <div class="card-title">📡 Live Analytics Event Log</div>
    <div class="event-log">
      <div class="log-entry" *ngFor="let entry of eventLog">
        <span class="log-time">{{ entry.time }}</span>
        <span class="log-type {{ entry.type }}">{{ entry.type }}</span>
        <span class="log-detail">{{ entry.detail }}</span>
      </div>
      <div class="log-entry" *ngIf="eventLog.length === 0">
        <span style="color:#718096">Waiting for events...</span>
      </div>
    </div>
  </div>

</div>
